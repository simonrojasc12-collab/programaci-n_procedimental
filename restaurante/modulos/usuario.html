<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <title>Usuario</title>
    <link rel="stylesheet" href="../css/usuario.css" />
  </head>
  <body>
    <script src="../js/usuario.js"></script>

    <button class="btn-inicio" onclick="window.location.href = '../index.html'">
      ⬅
    </button>

    <style>
      .btn-inicio {
        background: #c9dee2;
        color: #90b0b8;
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }

      .btn-inicio:hover {
        background: #475a5e;
      }
    </style>

    <div class="container">
      <div class="field">
        <label class="label">Nombre</label>
        <div class="control">
          <input class="input" type="text" id="nombre" placeholder="Nombre" />
        </div>
      </div>

      <div class="field">
        <label class="label">Apellido</label>
        <div class="control">
          <input class="input" type="text" placeholder="Apellido" />
        </div>
      </div>

      <div class="field">
        <label class="label">Tipo de documento</label>
        <div class="control">
          <div class="select is-fullwidth">
            <select>
              <option>T.I</option>
              <option>C.C</option>
            </select>
          </div>
        </div>
      </div>

      <div class="field">
        <label class="label">Número de documento</label>
        <div class="control">
          <input
            class="input"
            type="text"
            id="numero_documento"
            placeholder="..."
          />
        </div>
      </div>

      <div class="field">
        <label class="label">Teléfono</label>
        <div class="control">
          <input class="input" type="text" id="telefono" placeholder="..." />
        </div>
      </div>

      <div class="field">
        <label class="label">Correo</label>
        <div class="control has-icons-left has-icons-right">
          <input
            class="input is-danger"
            type="email"
            placeholder="Email"
            value="..."
          />
          <span class="icon is-small is-left">
            <i class="fas fa-envelope"></i>
          </span>
          <span class="icon is-small is-right">
            <i class="fas fa-exclamation-triangle"></i>
          </span>
        </div>
      </div>

      <div class="field">
        <label class="label">Género</label>
        <div class="control">
          <div class="select is-fullwidth">
            <select>
              <option>Masculino</option>
              <option>Femenino</option>
            </select>
          </div>
        </div>
      </div>

      <div class="field">
        <label class="label">Cargo</label>
        <div class="control">
          <input class="input" type="text" id="cargo" placeholder="Cargo" />
        </div>
      </div>

      <div class="field">
        <label class="label">Fecha de nacimiento</label>
        <div class="control">
          <input class="input" type="date" placeholder="Fecha" />
        </div>
      </div>

      <div class="field">
        <label class="label">Contraseña</label>
        <div class="control">
          <input
            class="input"
            type="password"
            id="contraseña"
            placeholder="Contraseña"
          />
        </div>
      </div>
      <div class="field mt-5">
        <div class="control">
          <button
            class="button is-primary is-fullwidth"
            id="btnRegistrar"
            type="button"
          >
            Registrarse
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
