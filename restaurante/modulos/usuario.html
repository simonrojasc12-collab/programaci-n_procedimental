<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuario</title>
  </head>
  <body>
    <div class="field">
      <label class="label">Nombre</label>
      <div class="control">
        <input class="input" type="text" placeholder="Nombre" />
      </div>
    </div>

    <div class="field">
      <label class="label">Apellido</label>
      <div class="control">
        <input class="input" type="text" placeholder="Apellido" />
      </div>
    </div>

    <div class="Tipo de documento">
      <label class="label">Tipo de documento</label>
      <select>
        <option>T.I</option>
        <option>C.C</option>
      </select>
    </div>

    <div class="field">
      <label class="label">Numero de documento</label>
      <div class="control">
        <input class="input" type="INT" placeholder="..." />
      </div>
    </div>

    <div class="field">
      <label class="label">Telefono</label>
      <div class="control">
        <input class="input" type="INT" placeholder="..." />
      </div>
    </div>

    <div class="field">
      <label class="label">Correo</label>
      <div class="control has-icons-left has-icons-right">
        <input
          class="input is-danger"
          type="email"
          placeholder="Email input"
          value="..."
        />
        <span class="icon is-small is-left">
          <i class="fas fa-envelope"></i>
        </span>
        <span class="icon is-small is-right">
          <i class="fas fa-exclamation-triangle"></i>
        </span>
      </div>
    </div>

    <div class="Tipo de documento">
      <label class="label">Genero</label>
      <select>
        <option>Masculino</option>
        <option>Femenino</option>
      </select>
    </div>

    <div class="field">
      <label class="label">Cargo</label>
      <div class="control">
        <input class="input" type="text" placeholder="Cargo" />
      </div>
    </div>

        <div class="field">
      <label class="label">Fecha de nacimiento</label>
      <div class="control">
        <input class="input" type="INT" placeholder="Fecha" />
      </div>
    </div>

    <div class="field">
      <label class="label">Contraseña</label>
      <div class="control">
        <input class="input" type="text" placeholder="Contraseña" />
      </div>
    </div>


  </body>
</html>
