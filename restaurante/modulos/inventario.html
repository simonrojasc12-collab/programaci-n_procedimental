<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="../css/inventario.css" />
    <title>Inventario</title>
  </head>
  <body>
    <script src="../js/inventario.js"></script>

    <button class="btn-inicio" onclick="window.location.href = '../index.html'">
      ⬅
    </button>

    <style>
      .btn-inicio {
        background: #c9dee2;
        color: #90b0b8;
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }

      .btn-inicio:hover {
        background: #475a5e;
      }
    </style>

    <div class="container">
      <div class="field">
        <label class="label">Código del producto</label>
        <div class="control">
          <input class="input" type="text" id="codigo" placeholder="Código" />
        </div>
      </div>

      <div class="field">
        <label class="label">Nombre del producto</label>
        <div class="control">
          <input
            class="input"
            type="text"
            id="nombre_producto"
            placeholder="Nombre"
          />
        </div>
      </div>

      <div class="field">
        <label class="label">Cantidad de producto</label>
        <div class="control">
          <input
            class="input"
            type="text"
            id="cantidad_producto"
            placeholder="Cantidad"
          />
        </div>
      </div>

      <div class="field">
        <label class="label">Marca del producto</label>
        <div class="control">
          <input class="input" type="text" placeholder="Marca" />
        </div>
      </div>
      <div class="field mt-5">
        <div class="control">
          <button
            class="button is-primary is-fullwidth"
            id="btnRegistrar"
            type="button"
          >
            Registrarse
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
