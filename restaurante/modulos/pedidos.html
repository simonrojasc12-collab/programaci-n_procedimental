<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <title>Pedidos</title>

    <style>
      body {
        background-color: #90b0b8;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        font-family: 'Arial', sans-serif;
        margin: 0;
        padding: 20px;
      }

      .container {
        max-width: 400px;
        width: 100%;
        background: #c9dee2;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 1.5em;
        color: #313030;
      }
    </style>
  </head>

  <body>
    <div class="container">

      <div class="field">
        <label class="label">Producto</label>
        <div class="control">
          <input class="input" type="text" placeholder="Producto" />
        </div>
      </div>

      <div class="field">
        <label class="label">Dirección</label>
        <div class="control">
          <input class="input" type="text" placeholder="Dirección" />
        </div>
      </div>

      <div class="field">
        <label class="label">Nombre del usuario</label>
        <div class="control">
          <input class="input" type="text" placeholder="Nombre" />
        </div>
      </div>

      <div class="field">
        <label class="label">Cantidad</label>
        <div class="control">
          <input class="input" type="number" placeholder="Cantidad" />
        </div>
      </div>

      <div class="field">
        <label class="label">Método de pago</label>
        <div class="control">
          <div class="select is-fullwidth">
            <select>
              <option>Seleccione un método</option>
              <option>Efectivo</option>
              <option>Tarjeta</option>
              <option>Transferencia</option>
              <option>Nequi</option>
              <option>Daviplata</option>
            </select>
          </div>
        </div>
      </div>

      <div class="field">
        <label class="label">Teléfono</label>
        <div class="control">
          <input class="input" type="tel" placeholder="Teléfono" />
        </div>
      </div>
    </div>
  </body>
</html>
