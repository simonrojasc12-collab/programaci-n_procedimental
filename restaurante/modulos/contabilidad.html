<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <title>Ventas Restaurante</title>

    <style>
      body {
        background-color: #90b0b8;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        font-family: "Arial", sans-serif;
        margin: 0;
        padding: 20px;
      }

      .container {
        max-width: 400px;
        width: 100%;
        background: #c9dee2;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 1.5em;
        color: #252222;
      }
    </style>
  </head>

  <body>

    <script src="../js/contabilidad.js"></script>

  <button class="btn-inicio" onclick="window.location.href='../index.html'">
    ⬅
</button>

<style>
.btn-inicio{
    background:#c9dee2;
    color:#90b0b8;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

.btn-inicio:hover{
    background:#475a5e;
}
</style>

    <div class="column">
      <div class="card">
        <div class="card-content">
          <div class="media">
            <div class="media-left">
              <figure class="image is-128x128">
                <img
                  src="https://cdn-icons-png.flaticon.com/128/8366/8366586.png"
                  alt="Placeholder image"
                />
              </figure>
            </div>
            <div class="field">
              <label class="label">Usuario</label>
              <div class="control">
                <input class="input" type="text" id="usuario" placeholder="Usuario" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="container">
      <div class="container">
        <div class="field">
          <label class="label">Contabilidad</label>
        </div>
      </div>

      <div class="field">
        <label class="label">Ventas</label>
        <div class="control">
          <input class="input" type="text" id="ventas" placeholder="Número de venta" />
        </div>
      </div>

      <div class="field">
        <label class="label">Fecha</label>
        <div class="control">
          <input class="input" type="date" />
        </div>
      </div>

      <div class="field">
        <label class="label">Ingresos</label>
        <div class="control">
          <input class="input" type="text" id="ingresos" placeholder="Ingresos del día" />
        </div>
      </div>

      <div class="field">
        <label class="label">Concepto</label>
        <div class="control">
          <input class="input" type="text" placeholder="Descripción" />
        </div>
      </div>

      <div class="field">
        <label class="label">Valor</label>
        <div class="control">
          <input class="input" type="number" id="valor" placeholder="Valor en pesos" />
        </div>
      </div>
    </div>
  </body>
</html>
